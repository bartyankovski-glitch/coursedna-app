<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f9fc;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg,#4f46e5,#2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .preview {
      padding: 20px;
      border-radius: 12px;
      background: linear-gradient(135deg,#1e3a8a,#3b82f6);
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- AUTO MODE -->
  <div class="card">
    <h3>AUTO mode (beta)</h3>

    <textarea id="authorContext" placeholder="Wklej LinkedIn, opis książek, bio autora..."></textarea>

    <button onclick="analyzeAuthor()">Analizuj autora</button>

    <div id="analyzeStatus"></div>
  </div>

  <!-- FORM -->
  <div class="card">

    <input id="authorName" placeholder="Autor">
    <input id="bookTitle" placeholder="Tytuł książki">
    <input id="bookSubtitle" placeholder="Podtytuł">
    <input id="category" placeholder="Kategoria">

    <select id="tone">
      <option value="premium">premium</option>
      <option value="dark">dark</option>
      <option value="light">light</option>
    </select>

    <select id="language">
      <option value="pl">pl</option>
      <option value="en">en</option>
    </select>

    <button onclick="generate()">Generuj preview</button>

  </div>

  <!-- PREVIEW -->
  <div id="preview" class="preview"></div>

</div>

<script>

async function analyzeAuthor() {
  const authorContext = document.getElementById("authorContext").value;
  const status = document.getElementById("analyzeStatus");

  status.innerText = "Analizuję...";

  try {
    const res = await fetch("/api/author/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ authorContext })
    });

    const data = await res.json();

    if (!data.ok) {
      status.innerText = "Błąd analizy";
      return;
    }

    const r = data.result;

    document.getElementById("authorName").value = r.author || "";
    document.getElementById("bookTitle").value = r.title || "";
    document.getElementById("bookSubtitle").value = r.subtitle || "";
    document.getElementById("category").value = r.category || "";
    document.getElementById("tone").value = r.tone || "premium";

    status.innerText = "Gotowe ✔";

  } catch (e) {
    status.innerText = "Błąd połączenia";
  }
}

async function generate() {
  const payload = {
    authorName: document.getElementById("authorName").value,
    bookTitle: document.getElementById("bookTitle").value,
    bookSubtitle: document.getElementById("bookSubtitle").value,
    primaryCategory: document.getElementById("category").value,
    tone: document.getElementById("tone").value,
    language: document.getElementById("language").value
  };

  const res = await fetch("/api/covers/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  document.getElementById("preview").innerHTML =
    "<h2>" + payload.bookTitle + "</h2>" +
    "<p>" + payload.bookSubtitle + "</p>" +
    "<p>" + payload.authorName + "</p>";
}

</script>

</body>
</html>
