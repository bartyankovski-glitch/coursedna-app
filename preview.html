<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f9fc;
      padding: 20px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg,#4f46e5,#2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .preview {
      background: linear-gradient(135deg,#1e3a8a,#3b82f6);
      color: white;
      padding: 30px;
      border-radius: 16px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h3>AUTO mode (beta)</h3>

    <textarea id="authorContext" placeholder="Wklej LinkedIn, opis książek, bio autora..."></textarea>

    <button onclick="analyzeAuthor()">Analizuj autora</button>

    <div id="analyzeStatus"></div>
  </div>

    <input id="bookSubtitle" placeholder="Podtytuł">
    <input id="category" placeholder="Kategoria">
