"<!DOCTYPE html>
<html lang=\"pl\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>Preview</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f9fc;
      padding: 20px;
    }

    .wrap {
      max-width: 1120px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg,#4f46e5,#2563eb);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .preview {
      background: linear-gradient(135deg,#1e3a8a,#3b82f6);
      color: white;
      padding: 30px;
      border-radius: 16px;
      margin-top: 10px;
    }

    #analyzeStatus {
      margin-top: 12px;
      padding: 12px;
      border-radius: 8px;
      background: #f1f5f9;
      border: 1px solid #dbe2ea;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 24px;
    }

    h2, h3, p {
      margin-top: 0;
    }
  </style>
</head>

<body>

<div class=\"wrap\">

  <div class=\"card\">
    <h3>AUTO mode (beta)</h3>

    <textarea id=\"authorContext\" placeholder=\"Wklej LinkedIn, opis książek, bio autora...\"></textarea>

    <button onclick=\"analyzeAuthor()\">Analizuj autora</button>

    <div id=\"analyzeStatus\"></div>
  </div>

  <div class=\"card\">
    <input id=\"authorName\" placeholder=\"Autor\">
    <input id=\"bookTitle\" placeholder=\"Tytuł książki\">
    <input id=\"bookSubtitle\" placeholder=\"Podtytuł\">
    <input id=\"category\" placeholder=\"Kategoria\">

    <select id=\"tone\">
      <option value=\"premium\">premium</option>
      <option value=\"classic\">classic</option>
      <option value=\"modern\">modern</option>
      <option value=\"bold\">bold</option>
    </select>

    <div class=\"preview\">
      <h2 id=\"previewAuthor\">Autor</h2>
      <h3 id=\"previewTitle\">Tytuł książki</h3>
      <p id=\"previewSubtitle\">Podtytuł</p>
      <p id=\"previewCategory\">Kategoria</p>
      <p id=\"previewTone\">Tone: premium</p>
    </div>
  </div>

</div>

<script>
  function updatePreview() {
    const authorName = document.getElementById(\"authorName\").value || \"Autor\";
    const bookTitle = document.getElementById(\"bookTitle\").value || \"Tytuł książki\";
    const bookSubtitle = document.getElementById(\"bookSubtitle\").value || \"Podtytuł\";
    const category = document.getElementById(\"category\").value || \"Kategoria\";
    const tone = document.getElementById(\"tone\").value || \"premium\";

    document.getElementById(\"previewAuthor\").innerText = authorName;
    document.getElementById(\"previewTitle\").innerText = bookTitle;
    document.getElementById(\"previewSubtitle\").innerText = bookSubtitle;
    document.getElementById(\"previewCategory\").innerText = category;
    document.getElementById(\"previewTone\").innerText = \"Tone: \" + tone;
  }

  document.getElementById(\"authorName\").addEventListener(\"input\", updatePreview);
  document.getElementById(\"bookTitle\").addEventListener(\"input\", updatePreview);
  document.getElementById(\"bookSubtitle\").addEventListener(\"input\", updatePreview);
  document.getElementById(\"category\").addEventListener(\"input\", updatePreview);
  document.getElementById(\"tone\").addEventListener(\"change\", updatePreview);

  async function analyzeAuthor() {
    const status = document.getElementById(\"analyzeStatus\");
    const input = document.getElementById(\"authorContext\").value;

    if (!input.trim()) {
      status.innerText = \"Wklej najpierw tekst do analizy.\";
      return;
    }

    status.innerText = \"Analizuję...\";

    try {
      const response = await fetch(\"https://coursedna-app.onrender.com/api/author/analyze\", {
        method: \"POST\",
        headers: {
          \"Content-Type\": \"application/json\"
        },
        body: JSON.stringify({
          input: input
        })
      });

      const contentType = response.headers.get(\"content-type\") || \"\";
      let data;

      if (contentType.includes(\"application/json\")) {
        data = await response.json();
      } else {
        const rawText = await response.text();
        status.innerText = \"Błąd: backend nie zwrócił JSON. Odpowiedź:\\n\\n\" + rawText;
        return;
      }

      if (!response.ok) {
        status.innerText = \"Błąd API: \" + JSON.stringify(data, null, 2);
        return;
      }

      status.innerText = \"OK: \" + JSON.stringify(data, null, 2);

      const result = data.result || data;

      if (result.author) {
        document.getElementById(\"authorName\").value = result.author;
      }
      if (result.title) {
        document.getElementById(\"bookTitle\").value = result.title;
      }
      if (result.subtitle) {
        document.getElementById(\"bookSubtitle\").value = result.subtitle;
      }
      if (result.category) {
        document.getElementById(\"category\").value = result.category;
      }
      if (result.tone) {
        document.getElementById(\"tone\").value = result.tone;
      }

      updatePreview();

    } catch (err) {
      status.innerText = \"Błąd: \" + err.message;
    }
  }

  updatePreview();
</script>

</body>
</html>"
