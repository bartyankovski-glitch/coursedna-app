services:
  - type: web
    name: coursedna-app
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: USE_OPENAI_IMAGES
        value: "true"
      - key: OPENAI_IMAGE_MODEL
        value: "gpt-image-1"
      - key: OPENAI_IMAGE_SIZE
        value: "1024x1536"
      - key: OPENAI_IMAGE_QUALITY
        value: "medium"
      - key: OPENAI_IMAGE_FORMAT
        value: "png"